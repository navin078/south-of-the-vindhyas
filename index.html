<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>South of the Vindhyas</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; }
        html, body, #map { height: 100%; width: 100%; }
    </style>
</head>
<body>
    <nav style="position: absolute; top: 10px; left: 50px; z-index: 1000; background: rgba(255,255,255,0.9); padding: 5px 15px; border-radius: 4px; font-family: Georgia, serif;">
    <a href="/" style="font-weight: bold;">Map</a> | 
    <a href="/blog">Blog</a>
    </nav>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([13.0, 78.0], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 18
        }).addTo(map);

        fetch('south-india-railways.geojson')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: '#555555', weight: 1.5, opacity: 0.7 }
                }).addTo(map);
            });
    </script>
</body>
</html>
